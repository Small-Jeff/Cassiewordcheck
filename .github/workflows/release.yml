name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build & Publish
        run: dotnet publish CassieWordCheck.csproj -c Release -r win-x64 -o publish-output --verbosity quiet

      - name: Clean debug symbols
        run: Remove-Item "publish-output/*.pdb" -ErrorAction SilentlyContinue

      - name: Package zip
        run: Compress-Archive -Path "publish-output/*" -DestinationPath "CassieWordCheck-v${{ github.ref_name }}.zip" -Force

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: CassieWordCheck-v${{ github.ref_name }}.zip
          generate_release_notes: true
