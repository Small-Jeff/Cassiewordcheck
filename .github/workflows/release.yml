name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build & Publish to dist
        run: dotnet publish CassieWordCheck.csproj -c Release -r win-x64 -o dist --verbosity quiet

      - name: Clean debug symbols
        run: Remove-Item "dist/*.pdb" -ErrorAction SilentlyContinue

      - name: Package zip
        run: Compress-Archive -Path "dist/*" -DestinationPath "CASSIE CWC Tool（CASSIE Word Check）.zip" -Force

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: CASSIE CWC Tool（CASSIE Word Check）.zip
