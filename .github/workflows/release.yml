name: Build & Release

on:
  push:
    tags:
      - "v*"      # 推送 v2.1.0 这样的 tag 时自动触发

jobs:
  build:
    runs-on: windows-latest   # WPF 需要 Windows 环境
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 编译发布（单文件自包含）
        run: dotnet publish CassieWordCheck.csproj -c Release -r win-x64 -o publish-output --verbosity quiet

      - name: 清理调试符号
        run: |
          if (Test-Path "publish-output/*.pdb") { Remove-Item "publish-output/*.pdb" }

      - name: 打包 zip
        run: Compress-Archive -Path "publish-output/*" -DestinationPath "CASSIE CWC Tool（CASSIE Word Check）.zip" -Force

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          files: CASSIE CWC Tool（CASSIE Word Check）.zip
          generate_release_notes: true
